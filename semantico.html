<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Semântico</title>
</head>
<body>
    <header> <!-- header - tag semântica: cabeçalho da página-->
        Este é o cabeçalho da página.
        <nav> <!-- nav: menu de navegação-->
            menu de opções
        </nav>
    </header>
    <main>
        <article> <!-- divisória-->
            um bloco
        </article>
        <article>
            outro bloco
        </article>
        <section>
            seção
        </section>
    </main>
    <footer>
        rodapé da página
    </footer>
</body>
</html>
